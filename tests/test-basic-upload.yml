name: Test basic upload inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create dummy release file
        run: |
          echo "dummy apk content" > /tmp/app-release.apk
      - name: Create dummy mapping file
        run: |
          echo "dummy mapping" > /tmp/mapping.txt
      - name: Create whats new directory
        run: |
          mkdir -p /tmp/whatsnew
          echo "Bug fixes and improvements" > /tmp/whatsnew/en-US.txt
      - id: action
        uses: .
        continue-on-error: true
        with:
          serviceAccountJson: /tmp/fake-service-account.json
          packageName: com.example.myapp
          releaseFile: /tmp/app-release.apk
          releaseName: "1.0.0"
          track: internal
          status: completed
          inAppUpdatePriority: "3"
          mappingFile: /tmp/mapping.txt
          whatsNewDirectory: /tmp/whatsnew
          changesNotSentForReview: "false"
      - name: Assert action ran (expected to fail without real credentials)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" = "success" ] || [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action ran as expected"
          else
            echo "FAIL: unexpected outcome: $OUTCOME"
            exit 1
          fi
