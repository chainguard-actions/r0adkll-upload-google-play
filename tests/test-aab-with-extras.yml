name: Test AAB upload with mapping, debug symbols, and whats new
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create dummy release files and extras
        run: |
          mkdir -p /tmp/release
          mkdir -p /tmp/whatsnew
          echo "dummy aab content" > /tmp/release/app-release.aab
          echo "dummy aab content 2" > /tmp/release/app-release2.aab
          echo "dummy mapping" > /tmp/release/mapping.txt
          echo "dummy debug symbols" > /tmp/release/native-debug-symbols.zip
          echo "en-US whatsnew" > /tmp/whatsnew/whatsnew-en-US
          echo "fr-FR whatsnew" > /tmp/whatsnew/whatsnew-fr-FR
      - id: action
        uses: .
        continue-on-error: true
        with:
          serviceAccountJsonPlainText: '{"type":"service_account","project_id":"fake","private_key_id":"fake","private_key":"fake","client_email":"fake@fake.iam.gserviceaccount.com","client_id":"fake","auth_uri":"https://accounts.google.com/o/oauth2/auth","token_uri":"https://oauth2.googleapis.com/token"}'
          packageName: com.example.myapp
          releaseFiles: /tmp/release/app-release.aab,/tmp/release/app-release2.aab
          track: alpha
          status: completed
          mappingFile: /tmp/release/mapping.txt
          debugSymbols: /tmp/release/native-debug-symbols.zip
          whatsNewDirectory: /tmp/whatsnew
      - name: Assert action ran (expected to fail with invalid credentials)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" = "success" ]; then
            echo "PASS: action succeeded"
          elif [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action failed as expected (no real credentials)"
          else
            echo "FAIL: unexpected outcome: $OUTCOME"
            exit 1
          fi
          echo "PASS"
