name: Test advanced upload inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create dummy files and directories
        run: |
          # Create dummy service account JSON file
          echo '{"type":"service_account","project_id":"test","private_key_id":"key123","private_key":"-----BEGIN RSA PRIVATE KEY-----\nMIIEowIBAAKCAQEA0Z3VS5JJcds3xHn\n-----END RSA PRIVATE KEY-----\n","client_email":"test@test.iam.gserviceaccount.com","client_id":"123","auth_uri":"https://accounts.google.com/o/oauth2/auth","token_uri":"https://oauth2.googleapis.com/token"}' > /tmp/service-account.json
          # Create dummy release files
          touch /tmp/app-release1.apk
          touch /tmp/app-release2.apk
          # Create whats new directory
          mkdir -p /tmp/whatsnew
          echo "Bug fixes and improvements" > /tmp/whatsnew/whatsnew-en-US
          # Create dummy mapping file
          echo "# mapping file" > /tmp/mapping.txt
          # Create dummy debug symbols zip
          touch /tmp/native-debug-symbols.zip
      - id: action
        uses: .
        continue-on-error: true
        with:
          serviceAccountJson: '/tmp/service-account.json'
          packageName: 'com.example.advancedapp'
          releaseFiles: '/tmp/app-release1.apk,/tmp/app-release2.apk'
          whatsNewDirectory: '/tmp/whatsnew'
          mappingFile: '/tmp/mapping.txt'
          debugSymbols: '/tmp/native-debug-symbols.zip'
          inAppUpdatePriority: '3'
          userFraction: '0.5'
          changesNotSentForReview: 'true'
          existingEditId: 'edit-id-12345'
          versionCodesToRetain: '100,101,102'
          tracks: 'production'
          status: 'draft'
      - name: Assert action ran (may fail due to invalid credentials)
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          echo "PASS: action step was reached and executed"
