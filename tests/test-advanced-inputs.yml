name: Test advanced inputs coverage
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create dummy release files
        run: |
          echo "dummy aab content 1" > /tmp/app-release-1.aab
          echo "dummy aab content 2" > /tmp/app-release-2.aab
          mkdir -p /tmp/debug-symbols
          echo "dummy debug symbols" > /tmp/debug-symbols/symbols.zip
      - id: action
        uses: .
        continue-on-error: true
        with:
          serviceAccountJsonPlainText: '{"type":"service_account","project_id":"fake","private_key_id":"fake","private_key":"fake","client_email":"fake@fake.iam.gserviceaccount.com","client_id":"fake","auth_uri":"https://accounts.google.com/o/oauth2/auth","token_uri":"https://oauth2.googleapis.com/token"}'
          packageName: com.example.myapp
          releaseFiles: /tmp/app-release-1.aab,/tmp/app-release-2.aab
          releaseName: "2.0.0"
          tracks: internal,alpha
          status: draft
          inAppUpdatePriority: "0"
          userFraction: "0.5"
          debugSymbols: /tmp/debug-symbols
          changesNotSentForReview: "true"
          existingEditId: "fake-edit-id-12345"
          versionCodesToRetain: "100,101,102"
      - name: Assert action ran (expected to fail without real credentials)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" = "success" ] || [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action ran as expected"
          else
            echo "FAIL: unexpected outcome: $OUTCOME"
            exit 1
          fi
